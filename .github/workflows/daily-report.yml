name: Günlük Meta Ads Raporu

# Her gün 06:00 UTC = 09:00 Türkiye saati. (Saati değiştirmek için cron'u düzenle.)
# Elle de çalıştırılabilir: Actions sekmesi -> Run workflow.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Raporu gönder
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_GRAPH_API_VERSION: ${{ secrets.META_GRAPH_API_VERSION }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python -m app.send_report
